
<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Gutierrez - Portafolio</title>
    <link rel="icon" type="image/png" href="public/assets/Icono.png">
    <meta name="description" content="Portafolio profesional de Daniel Gutierrez - Desarrollador Full Stack especializado en React, Node.js y Google Cloud.">
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
      // Immediately apply dark mode before paint to prevent flash
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      :root {
        --bg-color: #F9F8F6;
        --text-main: #121212;
        --accent: #121212;
      }
      html.dark {
        --bg-color: #0a0a0a;
        --text-main: #e5e5e5;
        --accent: #e5e5e5;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .glass-nav {
        background: rgba(249, 248, 246, 0.8);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
      }
      html.dark .glass-nav {
        background: rgba(10, 10, 10, 0.85);
      }
      
      /* Reveal animations */
      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                    transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      
      .stagger-1 { transition-delay: 100ms; }
      .stagger-2 { transition-delay: 200ms; }
      .stagger-3 { transition-delay: 300ms; }

      .mobile-menu-overlay {
        position: fixed;
        inset: 0;
        background: #F9F8F6;
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        transform: translateY(-100%);
        transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
      }
      html.dark .mobile-menu-overlay {
        background: #0a0a0a;
      }
      .mobile-menu-overlay.open {
        transform: translateY(0);
      }

      .btn-sq {
        padding: 0.8rem 2rem;
        font-weight: 500;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.75rem;
        border: 1px solid #121212;
      }
      html.dark .btn-sq {
        border-color: #e5e5e5;
      }

      .float-animation {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
      
      @media (max-width: 640px) {
        .text-huge { font-size: 3.5rem !important; }
        .section-padding { padding-top: 4rem; padding-bottom: 4rem; }
      }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
